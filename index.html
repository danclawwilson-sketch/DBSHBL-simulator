<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB+SH vs BL+SH 策略模擬器 V3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#0a0e17;--card:#111827;--border:#1f2937;--accent:#00d9ff;--accent2:#00ff88;--orange:#ff8c00;--text:#e5e7eb;--red:#ff4466}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);padding:20px;margin:0;min-height:100vh}
.header{text-align:center;padding:20px;border-bottom:1px solid var(--border);margin-bottom:20px}
.header h1{color:var(--accent);text-shadow:0 0 10px var(--accent)}
.container{display:grid;grid-template-columns:340px 1fr;gap:20px;max-width:1800px;margin:0 auto}
.panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px}
.panel h3{color:var(--accent);margin-bottom:15px;font-size:1.1rem}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:.75rem;color:#9ca3af;margin-bottom:5px}
.input-group input,.input-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:4px;font-size:.9rem}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--accent)}
.toggle-group{display:flex;gap:8px;margin-bottom:12px}
.toggle-btn{flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:4px;font-size:.85rem;transition:all .2s}
.toggle-btn:hover{border-color:var(--accent)}
.toggle-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),#0088cc);color:#000;border:none;padding:12px;border-radius:4px;font-weight:bold;cursor:pointer;margin-top:10px;transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,217,255,.3)}
.results{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.result-col{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;position:relative}
.result-col.db-col{border-top:3px solid var(--accent)}
.result-col.bl-col{border-top:3px solid var(--orange)}
.result-col h3{font-size:1rem;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px}
.stat-card{background:var(--bg);padding:12px;border-radius:6px;border:1px solid var(--border);transition:all .2s}
.stat-card:hover{border-color:var(--accent)}
.stat-label{font-size:.7rem;color:#9ca3af;margin-bottom:4px}
.stat-value{font-size:1.1rem;font-weight:bold}
.green{color:var(--accent2)}.red{color:var(--red)}.orange{color:var(--orange)}
.log-container{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;height:200px;overflow-y:auto;font-size:.8rem;margin-top:15px}
.log-entry{padding:4px 0;border-bottom:1px solid var(--border)}
.log-entry:last-child{border-bottom:none}
.log-day{color:var(--accent);font-weight:bold}
.log-action{color:#9ca3af}
@media(max-width:1200px){.container{grid-template-columns:1fr}.results{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header"><h1>◈ DB+SH vs BL+SH 策略模擬器 V3</h1></div>
<div class="container">
<div class="panel">
<h3>⚙ 參數設定</h3>
<div class="input-group"><label>初始總資金 (USDT)</label><input type="number" id="totalCapital" value="10000"></div>
<div class="input-group"><label>水池數量</label><input type="number" id="poolCount" value="6"></div>
<div class="input-group"><label>每池金額 (USDT)</label><input type="number" id="poolSize" value="1000"></div>

<hr style="border-color:var(--border);margin:15px 0">

<h3 style="color:var(--accent)">組合一: DB + SH</h3>
<label style="font-size:.8rem;color:#9ca3af">DB模式</label>
<div class="toggle-group">
<button class="toggle-btn active" id="dbModeA" onclick="setDBMode('A')">單日結算</button>
<button class="toggle-btn" id="dbModeB" onclick="setDBMode('B')">每日投入</button>
</div>
<div class="input-group"><label>DB週期天數</label><input type="number" id="dbDays" value="7"></div>
<div class="input-group"><label>Target (-%)</label><input type="number" id="dbTarget" value="4.5" step="0.1"></div>
<div class="input-group"><label>KO (+%)</label><input type="number" id="dbKO" value="1" step="0.1"></div>
<div class="input-group"><label>DB APR (%)</label><input type="number" id="dbAPR" value="30"></div>

<hr style="border-color:var(--border);margin:15px 0">

<h3 style="color:var(--orange)">組合二: BL + SH</h3>
<div class="input-group"><label>低買折扣 (-%)</label><input type="number" id="blDiscount" value="44"></div>
<div class="input-group"><label>BL APR (%)</label><input type="number" id="blAPR" value="333"></div>

<hr style="border-color:var(--border);margin:15px 0">

<h3 style="color:var(--red)">SH 參數 (兩組獨立)</h3>
<div class="input-group"><label>SH目標 (+%)</label><input type="number" id="shTarget" value="3"></div>
<div class="input-group"><label>SH APR (%)</label><input type="number" id="shAPR" value="350"></div>
<div class="input-group"><label>回測天數</label>
<select id="backtestDays">
<option value="14">14天</option>
<option value="30">30天</option>
<option value="90">90天</option>
<option value="365" selected>365天</option>
</select>
</div>

<button class="btn" onclick="runSimulation()">▶ 開始回測</button>
</div>

<div class="results">
<div class="result-col db-col">
<h3>組合一: DB + SH</h3>
<div class="stats-grid">
<div class="stat-card"><div class="stat-label">總資產</div><div class="stat-value" id="db-total">--</div></div>
<div class="stat-card"><div class="stat-label">ROI</div><div class="stat-value" id="db-roi">--</div></div>
<div class="stat-card"><div class="stat-label">DB-SH持倉</div><div class="stat-value" id="db-eth">--</div></div>
<div class="stat-card"><div class="stat-label">備用金</div><div class="stat-value" id="db-reserve">--</div></div>
</div>
<canvas id="dbChart" height="120"></canvas>
<div class="log-container" id="db-log"></div>
</div>

<div class="result-col bl-col">
<h3>組合二: BL + SH</h3>
<div class="stats-grid">
<div class="stat-card"><div class="stat-label">總資產</div><div class="stat-value" id="bl-total">--</div></div>
<div class="stat-card"><div class="stat-label">ROI</div><div class="stat-value" id="bl-roi">--</div></div>
<div class="stat-card"><div class="stat-label">BL-SH持倉</div><div class="stat-value" id="bl-eth">--</div></div>
<div class="stat-card"><div class="stat-label">進行中池</div><div class="stat-value" id="bl-pools">--</div></div>
</div>
<canvas id="blChart" height="120"></canvas>
<div class="log-container" id="bl-log"></div>
</div>
</div>
</div>

<script>
let dbMode='A';
let dbLogs=[],blLogs=[];

function setDBMode(mode){
dbMode=mode;
document.getElementById('dbModeA').classList.toggle('active',mode==='A');
document.getElementById('dbModeB').classList.toggle('active',mode==='B');
}

function generatePriceData(days){
const data=[];
let price=2000;
for(let i=0;i<days;i++){
const change=(Math.random()-0.5)*0.08;
price*=(1+change);
data.push({
date:'Day'+(i+1),
open:price*0.995,
high:price*1.025,
low:price*0.975,
close:price,
avg:price
});
}
return data;
}

// 組合一: DB+SH - 單日結算模式
function runDBModeA(priceData,capital,poolCount,poolSize,dbDays,target,ko,apr){
let reserve=capital;
let pools=[];
let shETH=0;
let equityHistory=[];
let nextPoolId=1;
dbLogs=[];

for(let day=0;day<priceData.length;day++){
const today=priceData[day];
let action='';

// 前poolCount天,每天投入一個池
if(day<poolCount&&reserve>=poolSize){
reserve-=poolSize;
pools.push({
id:nextPoolId++,
balance:poolSize,
startDay:day,
basePrice:today.close
});
action=`P${day+1}投入($${today.close.toFixed(2)})`;
}

// 第dbDays天結算所有池
if(day===dbDays-1&&pools.length>0){
action+=' | 結算:';
for(const p of pools){
const targetPrice=p.basePrice*(1-target/100);
const koPrice=p.basePrice*(1+ko/100);

if(today.avg>=koPrice){
// KO: 返還本金+利息到備用金
const interest=p.balance*(apr/100)*(dbDays/365);
const total=p.balance+interest;
reserve+=total;
action+=` P${p.id}KO`;
}else if(today.avg<=targetPrice){
// S1: 全轉ETH進SH
const ethAmount=p.balance/targetPrice;
shETH+=ethAmount;
action+=` P${p.id}S1($${targetPrice.toFixed(0)})`;
}else{
// S2: 一半ETH進SH,一半返還
const half=p.balance/2;
shETH+=half/targetPrice;
reserve+=half;
action+=` P${p.id}S2`;
}
}
pools=[];
// 結算後立即重新投入(單一池)
if(reserve>=poolSize){
reserve-=poolSize;
pools.push({id:nextPoolId++,balance:poolSize,startDay:day,basePrice:today.close});
action+=` | P${nextPoolId-1}再投入`;
}
}

// DB-SH每天檢查高賣
if(shETH>0){
const avgCost=(capital-reserve)/shETH||today.close;
const sellTarget=avgCost*(1+3/100);
if(today.avg>=sellTarget){
const sellValue=shETH*today.avg;
reserve+=sellValue;
action+=` | SH賣出${shETH.toFixed(3)}ETH`;
shETH=0;
}
}

const ethValue=shETH*today.close;
const poolsValue=pools.reduce((s,p)=>s+p.balance,0);
const total=reserve+poolsValue+ethValue;
equityHistory.push(total);

dbLogs.push({
day:today.date,
total:total,
reserve:reserve,
pools:poolsValue,
eth:shETH,
action:action||'持有中'
});
}

return{equityHistory,finalEquity:equityHistory[equityHistory.length-1]||capital,shETH,reserve,logs:dbLogs};
}

// 組合一: DB+SH - 每日投入模式(滾動)
function runDBModeB(priceData,capital,poolCount,poolSize,dbDays,target,ko,apr){
let reserve=capital;
let activePools=[];
let shETH=0;
let equityHistory=[];
let nextPoolId=1;
dbLogs=[];

for(let day=0;day<priceData.length;day++){
const today=priceData[day];
let action='';

// 每日投入新池(保持poolCount個活躍)
if(activePools.length<poolCount&&reserve>=poolSize){
reserve-=poolSize;
activePools.push({
id:nextPoolId++,
balance:poolSize,
startDay:day,
basePrice:today.close
});
action=`P${nextPoolId-1}投入`;
}

// 檢查到期的池
const remainingPools=[];
for(const p of activePools){
if(day-p.startDay>=dbDays){
// 到期結算
const targetPrice=p.basePrice*(1-target/100);
const koPrice=p.basePrice*(1+ko/100);

if(today.avg>=koPrice){
const interest=p.balance*(apr/100)*(dbDays/365);
const total=p.balance+interest;
reserve+=total;
action+=` P${p.id}KO`;
}else if(today.avg<=targetPrice){
shETH+=p.balance/targetPrice;
action+=` P${p.id}S1`;
}else{
const half=p.balance/2;
shETH+=half/targetPrice;
reserve+=half;
action+=` P${p.id}S2`;
}
// 結算後立即重新投入
if(reserve>=poolSize){
reserve-=poolSize;
remainingPools.push({
id:nextPoolId++,
balance:poolSize,
startDay:day,
basePrice:today.close
});
action+=`→P${nextPoolId-1}`;
}
}else{
remainingPools.push(p);
}
}
activePools=remainingPools;

// DB-SH檢查
if(shETH>0){
const avgCost=(capital-reserve)/shETH||today.close;
const sellTarget=avgCost*1.03;
if(today.avg>=sellTarget){
reserve+=shETH*today.avg;
action+=` | SH賣出${shETH.toFixed(3)}ETH`;
shETH=0;
}
}

const ethValue=shETH*today.close;
const poolsValue=activePools.reduce((s,p)=>s+p.balance,0);
const total=reserve+poolsValue+ethValue;
equityHistory.push(total);

dbLogs.push({
day:today.date,
total:total,
reserve:reserve,
pools:poolsValue,
eth:shETH,
action:action||'持有中'
});
}

return{equityHistory,finalEquity:equityHistory[equityHistory.length-1]||capital,shETH,reserve,logs:dbLogs};
}

// 組合二: BL+SH - 獨立運作
function runBLStrategy(priceData,capital,poolCount,poolSize,discount,apr,shTarget,shAPR){
let reserve=capital;
let activePools=[];
let shETH=0;
let equityHistory=[];
let nextPoolId=1;
blLogs=[];

for(let day=0;day<priceData.length;day++){
const today=priceData[day];
let action='';

// 投入新池(保持poolCount個)
if(activePools.length<poolCount&&reserve>=poolSize){
reserve-=poolSize;
const buyPrice=today.close*(1-discount/100);
activePools.push({
id:nextPoolId++,
balance:poolSize,
startDay:day,
buyPrice:buyPrice
});
action=`E${nextPoolId-1}投入(目標$${buyPrice.toFixed(0)})`;
}

// 檢查成交(每天檢查)
const remainingPools=[];
for(const p of activePools){
if(today.low<=p.buyPrice){
// 成交! ETH進獨立SH
const ethBought=p.balance/p.buyPrice;
shETH+=ethBought;
action+=` | E${p.id}成交($${p.buyPrice.toFixed(0)})→${ethBought.toFixed(3)}ETH`;
// 立即用備用金補充
if(reserve>=poolSize){
reserve-=poolSize;
const newBuyPrice=today.close*(1-discount/100);
remainingPools.push({
id:nextPoolId++,
balance:poolSize,
startDay:day,
buyPrice:newBuyPrice
});
action+=`→E${nextPoolId-1}補充`;
}
}else{
// 未成交,累積利息
p.balance*=(1+apr/100/365);
remainingPools.push(p);
}
}
activePools=remainingPools;

// BL-SH高賣檢查(獨立於DB-SH)
if(shETH>0){
// 計算平均成本
const totalInvested=(capital-reserve);
const avgCost=shETH>0?totalInvested/shETH:today.close*(1-discount/100);
const sellTarget=avgCost*(1+shTarget/100);

if(today.avg>=sellTarget){
const sellValue=shETH*today.avg*(1+shAPR/100/365);
reserve+=sellValue;
action+=` | SH賣出${shETH.toFixed(3)}ETH`;
shETH=0;
}
}

const ethValue=shETH*today.close;
const poolsValue=activePools.reduce((s,p)=>s+p.balance,0);
const total=reserve+poolsValue+ethValue;
equityHistory.push(total);

blLogs.push({
day:today.date,
total:total,
reserve:reserve,
pools:poolsValue,
eth:shETH,
action:action||'持有中'
});
}

return{equityHistory,finalEquity:equityHistory[equityHistory.length-1]||capital,shETH,reserve,poolCount:activePools.length,logs:blLogs};
}

function runSimulation(){
const capital=parseFloat(document.getElementById('totalCapital').value);
const poolCount=parseInt(document.getElementById('poolCount').value);
const poolSize=parseFloat(document.getElementById('poolSize').value);
const days=parseInt(document.getElementById('backtestDays').value);

const dbDays=parseInt(document.getElementById('dbDays').value);
const dbTarget=parseFloat(document.getElementById('dbTarget').value);
const dbKO=parseFloat(document.getElementById('dbKO').value);
const dbAPR=parseFloat(document.getElementById('dbAPR').value);

const blDiscount=parseFloat(document.getElementById('blDiscount').value);
const blAPR=parseFloat(document.getElementById('blAPR').value);

const shTarget=parseFloat(document.getElementById('shTarget').value);
const shAPR=parseFloat(document.getElementById('shAPR').value);

const priceData=generatePriceData(days);

// 執行策略
const dbResult=dbMode==='A'
?runDBModeA(priceData,capital,poolCount,poolSize,dbDays,dbTarget,dbKO,dbAPR)
:runDBModeB(priceData,capital,poolCount,poolSize,dbDays,dbTarget,dbKO,dbAPR);

const blResult=runBLStrategy(priceData,capital,poolCount,poolSize,blDiscount,blAPR,shTarget,shAPR);

// 更新顯示-組合一
const dbROI=((dbResult.finalEquity-capital)/capital*100).toFixed(2);
document.getElementById('db-total').textContent='$'+Math.round(dbResult.finalEquity).toLocaleString();
document.getElementById('db-total').className='stat-value '+(dbROI>=0?'green':'red');
document.getElementById('db-roi').textContent=(dbROI>=0?'+':'')+dbROI+'%';
document.getElementById('db-eth').textContent=dbResult.shETH.toFixed(4)+' ETH';
document.getElementById('db-reserve').textContent='$'+Math.round(dbResult.reserve).toLocaleString();

// 更新顯示-組合二
const blROI=((blResult.finalEquity-capital)/capital*100).toFixed(2);
document.getElementById('bl-total').textContent='$'+Math.round(blResult.finalEquity).toLocaleString();
document.getElementById('bl-total').className='stat-value '+(blROI>=0?'green':'red');
document.getElementById('bl-roi').textContent=(blROI>=0?'+':'')+blROI+'%';
document.getElementById('bl-eth').textContent=blResult.shETH.toFixed(4)+' ETH';
document.getElementById('bl-pools').textContent=blResult.poolCount+' 個';

// 繪圖
drawChart('dbChart',dbResult.equityHistory,'DB+SH','#00d9ff');
drawChart('blChart',blResult.equityHistory,'BL+SH','#ff8c00');

// 更新日誌
updateLogs('db-log',dbResult.logs.slice(-20));
updateLogs('bl-log',blResult.logs.slice(-20));
}

function updateLogs(containerId,logs){
const container=document.getElementById(containerId);
container.innerHTML=logs.map(log=>`
<div class="log-entry">
<span class="log-day">${log.day}</span>: 
$${Math.round(log.total).toLocaleString()} | 
<span class="log-action">${log.action}</span>
</div>
`).join('');
container.scrollTop=container.scrollHeight;
}

function drawChart(canvasId,data,label,color){
const ctx=document.getElementById(canvasId).getContext('2d');
if(window[canvasId+'Chart'])window[canvasId+'Chart'].destroy();

window[canvasId+'Chart']=new Chart(ctx,{
type:'line',
data:{
labels:data.map((_,i)=>'D'+(i+1)),
datasets:[{
label:label,
data:data,
borderColor:color,
backgroundColor:color+'20',
fill:true,
tension:0.3,
pointRadius:0
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{ticks:{color:'#9ca3af',callback:v=>'$'+v/1000+'k'}}
}
}
});
}

// 預設執行一次
runSimulation();
</script>
</body>
</html>
